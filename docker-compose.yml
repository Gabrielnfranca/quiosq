version: '3.8'
services:
  db:
    image: postgres:15
    container_name: postgres-quiosque
    restart: always
    environment:
      POSTGRES_DB: controle-mesa-quiosque
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: